name: Deploy to Neocities

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to Neocities
        env:
          NEOCITIES_TOKEN: ${{ secrets.NEOCITIES_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $NEOCITIES_TOKEN" \
            -F "wargaming/historicals/pacific-command-builder-2.html=@index.html" \
            -F "wargaming/historicals/app2/builder.jsx=@app2/builder.jsx" \
            -F "wargaming/historicals/app2/style.css=@app2/style.css" \
            -F "wargaming/historicals/app/data.js=@app/data.js" \
            -F "wargaming/historicals/app/print.css=@app/print.css" \
            -F "wargaming/historicals/assets/roundel-ijn.svg=@assets/roundel-ijn.svg" \
            -F "wargaming/historicals/assets/roundel-usn.svg=@assets/roundel-usn.svg" \
            https://neocities.org/api/upload
